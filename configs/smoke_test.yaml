experiment_name: smoke_dqn
seed: 0
output_dir: runs
total_episodes: 10

env:
  num_good: 1
  num_adversaries: 3
  num_obstacles: 2
  continuous_actions: false
  max_cycles: 50
  terminate_on_success: true

dqn:
  hidden_sizes: [32]
  learning_rate: 0.001
  gamma: 0.95

training:
  batch_size: 8
  buffer_capacity: 200
  min_buffer_size: 8
  target_update_interval: 10
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_episodes: 10
  team_reward_weight: 0.0
  curriculum: false

evaluation:
  eval_interval: 10
  eval_episodes: 2
  seeds: [0]
