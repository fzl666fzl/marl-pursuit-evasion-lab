experiment_name: mappo_baseline
algorithm: mappo
seed: 0
output_dir: runs
total_episodes: 3000

env:
  num_good: 1
  num_adversaries: 3
  num_obstacles: 2
  continuous_actions: false
  max_cycles: 50
  terminate_on_success: true

mappo:
  actor_hidden_sizes: [128, 128]
  critic_hidden_sizes: [128, 128]
  learning_rate: 0.001
  gamma: 0.95
  gae_lambda: 0.95
  clip_coef: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  update_epochs: 4
  rollout_episodes: 10
  max_grad_norm: 0.5

evaluation:
  eval_interval: 250
  eval_episodes: 10
  seeds: [0, 1, 2, 3, 4]
